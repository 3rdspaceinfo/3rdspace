<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThirdSpace | Public Beta</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --primary: #000000;
            --secondary: #52525b;
            --border: #e4e4e7;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--primary); padding-bottom: 95px; -webkit-font-smoothing: antialiased; }
        
        .hero { background: var(--surface); padding: 2rem 1.2rem 1rem; border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.8px; color: var(--primary); }
        .hero p { color: var(--secondary); font-size: 0.88rem; line-height: 1.45; letter-spacing: -0.1px; }
        .beta-notice { margin-top: 0.8rem; padding: 0.8rem; background: #fafafa; border: 1px solid var(--primary); border-radius: 8px; font-size: 0.8rem; color: var(--primary); font-weight: 600; line-height: 1.45; }
        
        .filter-container { background: var(--surface); padding: 1rem 1.2rem 1.2rem; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-title { font-size: 0.78rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.8px; border-left: 3px solid var(--primary); padding-left: 6px; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
        .checkbox-label { display: flex; align-items: center; font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--primary); user-select: none; }
        .checkbox-label input { margin-right: 0.5rem; accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }
        
        .search-action-container { padding: 0.2rem 0 0; }
        .btn-search-now { width: 100%; background: var(--primary); color: white; border: none; padding: 0.9rem; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; text-align: center; }
        .btn-search-now:active { background: var(--secondary); }

        .status-bar { padding: 0.6rem 1.2rem; background: var(--bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .counter-text { font-size: 0.8rem; font-weight: 700; color: var(--secondary); }
        .btn-reset { background: transparent; border: none; font-size: 0.8rem; font-weight: 700; color: var(--primary); text-decoration: underline; cursor: pointer; }

        .feed { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: 1rem; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.2rem; display: flex; flex-direction: column; gap: 0.6rem; }
        .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
        .badge { background: var(--primary); color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; text-transform: uppercase; }
        .card-title { font-size: 1.05rem; font-weight: 700; line-height: 1.35; color: var(--primary); flex-grow: 1; }
        .card-address { font-size: 0.75rem; color: var(--secondary); line-height: 1.3; margin-top: -0.2rem; }
        .amenities { display: flex; flex-direction: column; gap: 0.35rem; margin: 0.2rem 0; }
        .amenity-row { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; color: var(--secondary); gap: 0.4rem; }
        .amenity-indicator { color: var(--primary); font-weight: 700; }

        .price { font-weight: 700; font-size: 0.9rem; }
        .price span { font-weight: 400; color: var(--secondary); font-size: 0.75rem; }
