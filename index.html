    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --primary: #000000;
            --secondary: #52525b;
            --border: #e4e4e7;
            --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--primary); padding-bottom: 95px; -webkit-font-smoothing: antialiased; }
        
        /* Pure Tech Header Layout */
        .hero { background: var(--surface); padding: 2.2rem 1.2rem 1.4rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .hero h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.8px; color: var(--primary); }
        .hero p { color: var(--secondary); font-size: 0.88rem; margin-bottom: 1.2rem; line-height: 1.45; letter-spacing: -0.1px; }
        
        /* Search Bar Engine */
        .search-bar { display: flex; align-items: center; background: var(--bg); border-radius: 12px; padding: 0.8rem 1rem; border: 1px solid var(--border); }
        .search-bar input { border: none; background: transparent; width: 100%; font-size: 0.95rem; outline: none; margin-left: 0.5rem; color: var(--primary); }
        .search-icon-svg { color: var(--secondary); display: flex; align-items: center; }

        /* District Selector Chips */
        .chip-scroll { display: flex; overflow-x: auto; gap: 0.5rem; padding: 1rem 1.2rem; background: var(--surface); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        .chip-scroll::-webkit-scrollbar { display: none; }
        .chip { padding: 0.5rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--secondary); white-space: nowrap; cursor: pointer; transition: all 0.15s ease; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Database Feed Grid */
        .feed { padding: 1.2rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.01); }
        .card-img-container { position: relative; height: 180px; background: #e4e4e7; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.95); backdrop-filter: blur(4px); padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; border: 1px solid var(--border); letter-spacing: 0.2px; }
        
        /* Workspace Metadata Card Body */
        .card-body { padding: 1.2rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem; line-height: 1.35; color: var(--primary); }
        .amenities { display: flex; gap: 0.4rem; margin: 0.6rem 0; flex-wrap: wrap; }
        .amenity-icon { background: var(--bg); padding: 0.35rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; color: var(--secondary); }
        
        /* Card Action Footer */
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
        .price { font-weight: 700; font-size: 0.95rem; }
        .price span { font-weight: 400; color: var(--secondary); font-size: 0.8rem; }
        .btn-action { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-align: center; }
        
        /* Premium Minimalist iOS-style Bottom Dock */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 0.7rem 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--secondary); font-size: 0.72rem; font-weight: 700; text-decoration: none; width: 33%; gap: 0.25rem; }
        .nav-item.active { color: var(--primary); }
        .nav-svg-holder { display: flex; align-items: center; justify-content: center; height: 20px; }
    </style>
</head>

        // Rendering function
        function renderCards(filteredData) {
            const feed = document.getElementById('cardFeed');
            const noResults = document.getElementById('noResults');
            
            if (filteredData.length === 0) {
                feed.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            feed.innerHTML = filteredData.map(ws => `
                <div class="card">
                    <div class="card-img-container">
                        <img src="${ws.img}" alt="${ws.name}" class="card-img" loading="lazy">
                        <div class="badge">${ws.tag}</div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${ws.name}</h3>
                        <div class="amenities">
                            <span class="amenity-icon">${ws.plug}</span>
                            <span class="amenity-icon">${ws.wifi}</span>
                        </div>
                        <div class="price-row">
                            <div class="price">${ws.price} <span>/ 每杯飲品起</span></div>
                            <a href="#" class="btn-action" onclick="alert('請直接前往該空間，或聯繫店家了解更多。'); return false;">前往</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initial render
        renderCards(workspaces);

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        let currentFilter = 'All Hubs';
        
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let filtered = workspaces;
            
            if (currentFilter !== 'All Hubs') {
                filtered = workspaces.filter(ws => ws.district === currentFilter);
            }
            
            if (query) {
                filtered = filtered.filter(ws => 
                    ws.name.toLowerCase().includes(query) ||
                    ws.district.toLowerCase().includes(query) ||
                    ws.tag.toLowerCase().includes(query)
                );
            }
            
            renderCards(filtered);
        });

        // Chip filter functionality
        const chips = document.querySelectorAll('.chip');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                
                currentFilter = chip.getAttribute('data-filter');
                const query = searchInput.value.toLowerCase();
                
                let filtered = workspaces;
                if (currentFilter !== 'All Hubs') {
                    filtered = workspaces.filter(ws => ws.district === currentFilter);
                }
                
                if (query) {
                    filtered = filtered.filter(ws => 
                        ws.name.toLowerCase().includes(query) ||
                        ws.district.toLowerCase().includes(query) ||
                        ws.tag.toLowerCase().includes(query)
                    );
                }
                
                renderCards(filtered);
            });
        });
    </script>

    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

</body>
